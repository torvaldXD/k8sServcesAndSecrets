apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasure-marulanda
  namespace: treasure-hunt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: treasure-marulanda
  template:
    metadata:
      labels:
        app: treasure-marulanda
    spec:
      containers:
        - name: web
          image: ghcr.io/fredyunivalle/treasure-new:latest
          ports:
            - containerPort: 80
          env:
            - name: TITLE
              value: "Treasure Hunt — Marulanda"
            - name: STUDENT
              value: "marulanda"
            - name: SALT
              value: "DS3univalle"
            - name: KEY_HASH
              value: "3598f3ece76d07b86c16ee55d4610ac74943d0ed5b10574651d7ef801d257377"
            - name: CLUE
              valueFrom:
                secretKeyRef:
                  name: marulanda-clue
                  key: CLUE
---
apiVersion: v1
kind: Service
metadata:
  name: treasure-marulanda
  namespace: treasure-hunt
spec:
  selector:
    app: treasure-marulanda
  ports:
    - name: http
      port: 80
      targetPort: 80
      # nodePort: 31080   # (opcional) fija uno en el rango 30000–32767
  type: NodePort
